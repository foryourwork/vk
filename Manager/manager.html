<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Manager Dashboard | VKETC</title>
    
    <script>
        const activeUser = JSON.parse(sessionStorage.getItem('activeUser'));
        if (!activeUser) { window.location.href = "login.html"; }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #ef4444; --accent: #6366f1; --success: #10b981; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--dark); padding-bottom: 50px; }

        .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; background: var(--dark); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .user-detail b { display: block; font-size: 15px; line-height: 1.2; }
        .user-detail span { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }

        .stats-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        /* Highlighted Bill Card */
        .bill-hero { background: white; border-radius: 24px; padding: 30px; border: 2px solid var(--primary); margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.1); }
        .bill-info small { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .bill-info h1 { margin: 5px 0 0; font-size: 42px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        @media (min-width: 992px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }

        .stat-card { background: white; padding: 20px; border-radius: 24px; border: 1px solid #e2e8f0; position: relative; overflow: hidden; transition: 0.3s; }
        .stat-card i { position: absolute; right: -10px; bottom: -10px; font-size: 60px; opacity: 0.05; }
        .stat-card h2 { margin: 8px 0 0; font-size: 28px; font-weight: 900; }
        
        .c-staff { color: var(--accent); }
        .c-verify { color: var(--success); }
        .c-calls { color: #f59e0b; }

        .section-title { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        @media (min-width: 768px) { .services-grid { grid-template-columns: repeat(6, 1fr); } }

        .service-item { background: white; padding: 25px 10px; border-radius: 20px; text-align: center; text-decoration: none; border: 1px solid #e2e8f0; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .service-item:hover { background: var(--dark); color: white; }
        .service-item:hover i, .service-item:hover span { color: white !important; }
        .service-item i { font-size: 30px; }
        .service-item span { font-size: 11px; font-weight: 700; color: var(--dark); }

        .btn-logout { background: #fee2e2; color: #ef4444; border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="user-info">
        <div class="avatar" id="userAvatar">M</div>
        <div class="user-detail">
            <b id="userName">Manager Name</b>
            <span>Executive Manager</span>
        </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-power-off"></i></button>
</nav>

<div class="stats-container">
    <div class="bill-hero">
        <div class="bill-info">
            <small>Total Outstanding (Unpaid Bill)</small>
            <h1 id="unpaidAmount">₹0.00</h1>
        </div>
        <i class="fas fa-wallet fa-3x" style="color: var(--primary); opacity: 0.2;"></i>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Active Staff</small>
            <h2 class="c-staff" id="countEmployees">0</h2>
            <i class="fas fa-users-cog"></i>
        </div>
        <div class="stat-card">
            <small>Tracked Today</small>
            <h2 class="c-verify" id="countVerified">0</h2>
            <i class="fas fa-sync-alt"></i>
        </div>
        <div class="stat-card">
            <small>Assigned Tasks</small>
            <h2 class="c-calls" id="countCalls">0</h2>
            <i class="fas fa-tasks"></i>
        </div>
    </div>

    <div class="section-title">Core Management Services</div>
    <div class="services-grid">
        <a href="mgsr.html" class="service-item">
            <i class="fas fa-user-clock" style="color: #ef4444;"></i>
            <span>MIS Sync</span>
        </a>
        <a href="employee_managment.html" class="service-item">
            <i class="fas fa-id-badge" style="color: #6366f1;"></i>
            <span>Staff Info</span>
        </a>
        <a href="calling_rep.html" class="service-item">
            <i class="fas fa-chart-pie" style="color: #f59e0b;"></i>
            <span>Call Reports</span>
        </a>
        <a href="verified_report.html" class="service-item">
            <i class="fas fa-check-double" style="color: #8b5cf6;"></i>
            <span>Verifications</span>
        </a>
        <a href="settings.html" class="service-item">
            <i class="fas fa-shield-alt" style="color: #64748b;"></i>
            <span>Security</span>
        </a>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBfAuBYPAbcxctTQjiRF3TwPE3eNNwYwxk",
    authDomain: "dbform-db4c9.firebaseapp.com",
    databaseURL: "https://dbform-db4c9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbform-db4c9",
    storageBucket: "dbform-db4c9.firebasestorage.app",
    messagingSenderId: "930632470946",
    appId: "1:930632470946:web:c87062b66c96ee6e5762fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

document.getElementById('userName').innerText = activeUser.name;
document.getElementById('userAvatar').innerText = activeUser.name.charAt(0).toUpperCase();

function loadRealTimeStats() {
    const today = new Date().toLocaleDateString('en-IN');

    // 1. Total Staff count
    db.ref('EmployeeAuthList').on('value', snap => {
        document.getElementById('countEmployees').innerText = snap.numChildren() || 0;
    });

    // 2. Task Assignments (UrgentCalls)
    db.ref('UrgentCalls').on('value', snap => {
        document.getElementById('countCalls').innerText = snap.numChildren() || 0;
    });

    // 3. Unified Billing & Tracking Logic
    // Hum dono pipeline (vssy_pipeline aur absent_sync_pipeline) ka data ek saath read karenge
    const p1 = db.ref('vssy_pipeline').once('value');
    const p2 = db.ref('absent_sync_pipeline').once('value');

    Promise.all([p1, p2]).then(snaps => {
        let totalUnpaid = 0;
        let totalTrackedToday = 0;

        snaps.forEach(snap => {
            snap.forEach(child => {
                const data = child.val();
                
                // Unpaid condition
                if (data.payment_status === 'Unpaid') {
                    totalUnpaid++;
                }

                // Tracking Today check (Sync Date formats match en-IN)
                if (data.sync_date === today || data.sync_time?.includes(today)) {
                    totalTrackedToday++;
                }
            });
        });

        // Accurate Bill Display
        const billValue = (totalUnpaid * 0.325).toFixed(2);
        document.getElementById('unpaidAmount').innerText = "₹" + billValue;
        document.getElementById('countVerified').innerText = totalTrackedToday;
    });

    // Re-check billing every 30 seconds for live feel
    setTimeout(loadRealTimeStats, 30000);
}

function logout() {
    sessionStorage.clear();
    window.location.href = "login.html";
}

window.onload = loadRealTimeStats;
</script>
</body>
</html>
