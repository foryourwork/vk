<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Pro | Advanced Sync Manager Final</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --red: #be123c; --red-bg: #fff1f2; --success: #059669; --gradient: linear-gradient(135deg, #be123c, #fb7185); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--red-bg); margin: 0; color: #1e293b; overflow-x: hidden; }
        
        #lockScreen { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .header { background: white; padding: 12px 15px; border-bottom: 3px solid var(--red); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 12px; }
        .banner { background: var(--gradient); color: white; padding: 25px; border-radius: 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(190, 18, 60, 0.2); }
        .banner b { font-size: 24px; display: block; font-weight: 800; }

        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #ffe4e6; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }

        label { display: block; font-size: 10px; font-weight: 800; color: var(--red); margin-bottom: 6px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #fda4af; margin-bottom: 10px; font-weight: 600; font-size: 14px; outline: none; background: #fffcfc; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--red); background: white; box-shadow: 0 0 0 4px rgba(190, 18, 60, 0.1); }

        .batch-counter { background: #fff1f2; padding: 15px; border-radius: 18px; text-align: center; font-weight: 800; border: 1.5px dashed var(--red); margin-bottom: 15px; font-size: 13px; }

        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 15px; border-top: 1px solid #ffe4e6; border-bottom: 1px solid #ffe4e6; font-size: 13px; }
        td:first-child { border-left: 1px solid #ffe4e6; border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid #ffe4e6; border-radius: 0 15px 15px 0; }

        .btn { padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; font-size: 11px; display: inline-flex; align-items: center; gap: 8px; color: white; transition: 0.3s; }
        .btn-shift { background: #0ea5e9; }
        .btn-unassign { background: var(--red); }
        
        .btn-excel { 
            background: #1e293b; width: 100%; justify-content: center; margin-bottom: 10px; 
            font-size: 12px; letter-spacing: 0.5px; border: 2px solid #1e293b;
        }
        .btn-attendance { background: #059669; border-color: #059669; }
        .btn-excel:hover { opacity: 0.9; transform: translateY(-2px); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        @media (max-width: 768px) {
            .btn-excel-desktop { display: none !important; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 15px; }
            td { text-align: right; position: relative; padding-left: 50%; border: 1px solid #ffe4e6 !important; border-radius: 12px !important; margin-bottom: 4px; }
            td:before { content: attr(data-label); position: absolute; left: 12px; font-weight: 800; color: var(--red); font-size: 10px; text-transform: uppercase; }
        }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #ffe4e6; z-index: 9999; display: none; }
        #loader-bar { height: 100%; background: var(--red); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="loader"><div id="loader-bar"></div></div>

<div id="lockScreen">
    <img src="https://cdn-icons-png.flaticon.com/512/6195/6195699.png" width="100">
    <h2 style="color:var(--red); font-weight:800; margin-top:20px;">ACCESS RESTRICTED</h2>
</div>

<div class="header">
    <div style="display:flex; align-items:center;">
        <div onclick="window.history.back()" style="cursor:pointer; color:var(--red); font-size: 20px;"><i class="fas fa-chevron-left"></i></div>
        <div style="margin-left: 12px;">
            <h2 id="roleLabel" style="font-size:10px; color:var(--red); font-weight:800; margin:0;">MIS SYNC LEAD</h2>
            <div id="uName" style="font-size:14px; font-weight:700;">Admin</div>
        </div>
    </div>
    <div id="clock" style="font-size:11px; font-weight:800; color: var(--red);"></div>
</div>

<div class="container">
    <div class="banner animate__animated animate__fadeInDown">
        <b>ENROLLMENT MASTER SYNC</b>
        <p style="font-size:11px; margin-top:5px; opacity:0.9;">Multi-Filter Data Management & Automated Reporting</p>
    </div>

    <div class="card animate__animated animate__fadeInUp">
        <div class="action-grid">
            <button class="btn btn-excel animate__animated animate__pulse" onclick="secureExport()">
                <i class="fas fa-file-excel"></i> STUDENT LIST
            </button>
            <button class="btn btn-excel btn-attendance animate__animated animate__pulse" onclick="exportAttendance()">
                <i class="fas fa-calendar-check"></i> ATTENDANCE SHEET
            </button>
        </div>

        <div class="filter-grid">
            <div>
                <label>1. Master List</label>
                <select id="listSelect" onchange="syncTrainings()"><option value="">-- Choose List --</option></select>
            </div>
            <div>
                <label>2. Trade Program</label>
                <select id="trainingSelect" onchange="filterBatches()"><option value="">-- Select Trade --</option></select>
            </div>
            <div>
                <label>3. Batch Status</label>
                <select id="statusFilter" onchange="filterBatches()">
                    <option value="In Progress">In Progress (Default)</option>
                    <option value="Upcoming">Upcoming</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div>
                <label>4. Select Batch</label>
                <select id="batchFilterSelect" onchange="loadCandidates()"><option value="">-- Select Batch --</option></select>
            </div>
            <div>
                <label>Search Candidate</label>
                <input type="text" id="tableSearch" placeholder="Search by name/app..." oninput="loadCandidates()">
            </div>
        </div>
    </div>

    <div class="card animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
        <div id="batchInfo" class="batch-counter">
            <span style="color:#64748b">Status: Select Batch Parameters</span>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Candidate</th><th>Guardian</th><th>Aadhar</th><th>DOB</th><th>Enroll Status</th><th style="text-align: right;">Actions</th></tr>
                </thead>
                <tbody id="candidateBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyBfAuBYPAbcxctTQjiRF3TwPE3eNNwYwxk",
    authDomain: "dbform-db4c9.firebaseapp.com",
    databaseURL: "https://dbform-db4c9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbform-db4c9",
    storageBucket: "dbform-db4c9.firebasestorage.app",
    messagingSenderId: "930632470946",
    appId: "1:930632470946:web:c87062b66c96ee6e5762fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allEnrollments = {}, batchesData = {}, masterDataRef = {}, EMPLOYEE_LOGIN_PIN = "";

function showLoad(show) {
    const l = document.getElementById('loader'), lb = document.getElementById('loader-bar');
    if(show) { l.style.display = 'block'; lb.style.width = '40%'; }
    else { lb.style.width = '100%'; setTimeout(() => { l.style.display = 'none'; lb.style.width = '0%'; }, 300); }
}

const sessionUser = sessionStorage.getItem('activeUser');
if(!sessionUser) {
    document.getElementById('lockScreen').style.display = 'flex';
} else {
    const userData = JSON.parse(sessionUser);
    document.getElementById('uName').innerText = userData.name || "Admin";
    EMPLOYEE_LOGIN_PIN = userData.pin || userData.password || "";
}

window.onload = function() {
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-IN'); }, 1000);
    showLoad(true);
    db.ref('OverallListsMetadata').on('value', snap => {
        const sel = document.getElementById('listSelect');
        sel.innerHTML = '<option value="">-- Choose Master List --</option>';
        snap.forEach(c => {
            if(c.val().status !== 'Hide It') sel.innerHTML += `<option value="${c.key}">${c.val().listName}</option>`;
        });
    });
    db.ref('Batches').on('value', snap => { batchesData = snap.val() || {}; filterBatches(); });
    db.ref('BatchEnrollments').on('value', snap => { allEnrollments = snap.val() || {}; loadCandidates(); });
    showLoad(false);
};

// Fixed: Load ALL trades from selected list regardless of status
function syncTrainings() {
    const lid = document.getElementById('listSelect').value;
    if(!lid) return;
    db.ref('Trainings').orderByChild('listId').equalTo(lid).once('value', snap => {
        const ts = document.getElementById('trainingSelect');
        ts.innerHTML = '<option value="">-- Select Trade --</option>';
        snap.forEach(c => {
            ts.innerHTML += `<option value="${c.key}" data-trade="${c.val().tradeName}">${c.val().trainingName}</option>`;
        });
    });
}

function filterBatches() {
    const trade = document.getElementById('trainingSelect').options[document.getElementById('trainingSelect').selectedIndex]?.getAttribute('data-trade');
    const status = document.getElementById('statusFilter').value;
    const bs = document.getElementById('batchFilterSelect');
    bs.innerHTML = '<option value="">-- Select Batch --</option>';
    if(!trade) return;
    for(let id in batchesData) {
        if(batchesData[id].trainingName === trade && batchesData[id].status === status) {
            const count = allEnrollments[id] ? Object.keys(allEnrollments[id]).length : 0;
            const limit = batchesData[id].limit || 30;
            bs.innerHTML += `<option value="${id}">${batchesData[id].batchName} (${count}/${limit})</option>`;
        }
    }
}

async function loadCandidates() {
    const lid = document.getElementById('listSelect').value;
    const bid = document.getElementById('batchFilterSelect').value;
    const tbody = document.getElementById('candidateBody');
    const search = document.getElementById('tableSearch').value.toLowerCase();

    if(!lid || !bid) { tbody.innerHTML = ''; return; }
    showLoad(true);
    const count = allEnrollments[bid] ? Object.keys(allEnrollments[bid]).length : 0;
    const limit = batchesData[bid].limit || 30;
    document.getElementById('batchInfo').innerHTML = `<span style="color:var(--red)">Selected Batch Enrolled: ${count} / ${limit}</span>`;

    db.ref(`FullDataEntries/${lid}`).once('value', snap => {
        tbody.innerHTML = '';
        masterDataRef = snap.val() || {};
        snap.forEach(child => {
            const d = child.val(), appNo = String(d.applicationNumber);
            if(!allEnrollments[bid] || !allEnrollments[bid][appNo]) return;
            if(search && !d.applicantName.toLowerCase().includes(search) && !appNo.includes(search)) return;

            tbody.innerHTML += `<tr>
                <td data-label="Candidate"><b>${d.applicantName}</b><br><small>${appNo}</small></td>
                <td data-label="Guardian">${d.fatherName || '-'}</td>
                <td data-label="Aadhar"><span style="color:var(--red);font-weight:700;">${d.verifiedAadhar || '---'}</span></td>
                <td data-label="DOB">${d.dob ? new Date(d.dob).toLocaleDateString('en-GB').replace(/\//g,'-') : '-'}</td>
                <td data-label="Enroll Status"><span style="color:var(--success);font-weight:800;">ENROLLED</span></td>
                <td data-label="Actions" style="text-align:right;">
                    <div style="display:flex; gap:5px; justify-content: flex-end;">
                        <button class="btn btn-shift" onclick="shiftOffer('${appNo}','${bid}')"><i class="fas fa-exchange-alt"></i> Shift</button>
                        <button class="btn btn-unassign" onclick="unassign('${appNo}','${bid}')"><i class="fas fa-user-minus"></i> Unassign</button>
                    </div>
                </td>
            </tr>`;
        });
        showLoad(false);
    });
}

async function unassign(appNo, bid) {
    const { value: pin } = await Swal.fire({ title: 'Authorization', text: 'Enter PIN to unassign candidate', input: 'password', showCancelButton: true });
    if (pin === EMPLOYEE_LOGIN_PIN && pin !== "") {
        await db.ref(`BatchEnrollments/${bid}/${appNo}`).remove();
        Swal.fire({ icon:'success', title:'Removed', timer: 1000, showConfirmButton: false });
        loadCandidates();
    } else if (pin !== undefined) Swal.fire('Error', 'Incorrect PIN', 'error');
}

async function shiftOffer(appNo, oldBid) {
    const trade = document.getElementById('trainingSelect').options[document.getElementById('trainingSelect').selectedIndex].getAttribute('data-trade');
    let opts = {};
    for(let id in batchesData) { 
        if(batchesData[id].trainingName === trade && id !== oldBid && batchesData[id].status === 'In Progress') {
            const count = allEnrollments[id] ? Object.keys(allEnrollments[id]).length : 0;
            const limit = batchesData[id].limit || 30;
            opts[id] = `${batchesData[id].batchName} (Current: ${count}/${limit})`; 
        }
    }
    if(Object.keys(opts).length === 0) return Swal.fire('No other active batches found');
    const { value: newBid } = await Swal.fire({ title: 'Shift Candidate', input: 'select', inputOptions: opts, showCancelButton: true });
    if(newBid) {
        const snap = await db.ref(`BatchEnrollments/${oldBid}/${appNo}`).once('value');
        await db.ref(`BatchEnrollments/${newBid}/${appNo}`).set(snap.val());
        await db.ref(`BatchEnrollments/${oldBid}/${appNo}`).remove();
        Swal.fire({ icon:'success', title:'Shifted!', timer: 1000, showConfirmButton: false });
        loadCandidates();
    }
}

async function secureExport() {
    const bid = document.getElementById('batchFilterSelect').value;
    if(!bid) return Swal.fire('Error', 'Select Batch First', 'warning');
    const { value: pin } = await Swal.fire({ title: 'Security Verification', text: 'Enter PIN to Download Excel', input: 'password', showCancelButton: true });
    if (pin !== EMPLOYEE_LOGIN_PIN) return pin !== undefined && Swal.fire('Error', 'Invalid Access PIN', 'error');

    Swal.fire({ title: 'Generating Report...', didOpen: () => Swal.showLoading() });
    const enrolledApps = allEnrollments[bid] ? Object.keys(allEnrollments[bid]) : [];
    const excelData = enrolledApps.map((app, idx) => {
        const m = Object.values(masterDataRef).find(x => String(x.applicationNumber) === String(app)) || {};
        return {
            'S.No': idx + 1,
            'Application No': m.applicationNumber || 'N/A',
            'Candidate Name': (m.applicantName || '').toUpperCase(),
            'Father Name': (m.fatherName || '').toUpperCase(),
            'Aadhar Number': m.verifiedAadhar || 'Pending',
            'Date of Birth': m.dob || 'N/A',
            'Mobile': m.mobile || 'N/A'
        };
    });
    const ws = XLSX.utils.json_to_sheet(excelData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "BatchReport");
    XLSX.writeFile(wb, `StudentList_${batchesData[bid].batchName}.xlsx`);
    Swal.close();
}

// New: Attendance Export with Dynamic Dates
async function exportAttendance() {
    const bid = document.getElementById('batchFilterSelect').value;
    if(!bid) return Swal.fire('Error', 'Select Batch First', 'warning');

    const { value: pin } = await Swal.fire({ title: 'PIN Required', text: 'Enter PIN for Attendance Sheet', input: 'password', showCancelButton: true });
    if (pin !== EMPLOYEE_LOGIN_PIN) return pin !== undefined && Swal.fire('Error', 'Incorrect PIN', 'error');

    Swal.fire({ title: 'Preparing Attendance Sheet...', didOpen: () => Swal.showLoading() });

    const batch = batchesData[bid];
    const enrolledApps = allEnrollments[bid] ? Object.keys(allEnrollments[bid]) : [];
    
    // Generate Date Headers
    const start = new Date(batch.startDate);
    const end = new Date(batch.endDate);
    const dateHeaders = {};
    let temp = new Date(start);
    while(temp <= end) {
        const dStr = temp.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit'});
        dateHeaders[dStr] = ""; 
        temp.setDate(temp.getDate() + 1);
    }

    const attendanceData = enrolledApps.map((app, idx) => {
        const m = Object.values(masterDataRef).find(x => String(x.applicationNumber) === String(app)) || {};
        return {
            'SR NO': idx + 1,
            'CANDIDATE NAME': (m.applicantName || '').toUpperCase(),
            'AADHAR NUMBER': m.verifiedAadhar || 'N/A',
            ...dateHeaders
        };
    });

    const ws = XLSX.utils.json_to_sheet(attendanceData);
    
    // Column Widths
    const wscols = [{wch:6}, {wch:25}, {wch:15}];
    Object.keys(dateHeaders).forEach(() => wscols.push({wch:4}));
    ws['!cols'] = wscols;

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Attendance");
    XLSX.writeFile(wb, `ATTENDANCE_${batch.batchName}.xlsx`);
    Swal.close();
}
</script>
</body>
</html>
