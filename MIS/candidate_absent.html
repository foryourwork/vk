<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Pro | MIS Lead Universal Manager v2</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #be123c; --danger: #ef4444; --success: #059669; --bg: #f8fafc; --warning: #f59e0b; --special-bg: #fffde7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: #1e293b; font-size: 13px; }

        #lockScreen { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .header { background: #fff; padding: 12px 20px; border-bottom: 2px solid #e2e8f0; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .back-btn { width: 35px; height: 35px; border-radius: 50%; background: #fff1f2; color: var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }

        .container { width: 100%; max-width: 1550px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        .btn { padding: 10px 16px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 11px; transition: 0.3s; }
        .btn-upload { background: var(--primary); color: white; }
        .btn-dl { background: #1e293b; color: white; }

        .filter-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; font-weight: 600; outline: none; }

        .tab-box { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding: 5px 0; }
        .tab { padding: 10px 22px; background: #e2e8f0; border-radius: 30px; cursor: pointer; font-weight: 800; font-size: 10px; white-space: nowrap; transition: 0.2s; }
        .tab.active { background: var(--primary); color: white; }

        .table-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow-x: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 10px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; padding-bottom: 40px; }
        .p-btn { min-width: 38px; height: 38px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .p-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .row-special { background: var(--special-bg) !important; border-left: 5px solid var(--warning); }
        .log-box { font-size: 10px; padding: 6px; border-radius: 6px; margin-bottom: 4px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lockScreen">
    <i class="fas fa-lock fa-4x" style="color:var(--primary)"></i>
    <h2 style="margin-top:20px;">ACCESS DENIED</h2>
    <p>Unauthorized Access! Sirf MIS Lead hi access kar sakte hain.</p>
</div>

<div class="header">
    <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
    <div style="flex-grow:1">
        <h2 style="margin:0; font-size:16px; font-weight:800;">Targeted Lead & Absent Manager</h2>
        <div id="uNameDisp" style="font-size:10px; font-weight:700; color:var(--primary);">Verifying MIS Lead...</div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-dl" onclick="secureAction('DOWNLOAD', 'PENDING')"><i class="fas fa-file-download"></i> Target Excel</button>
        <button class="btn btn-dl" onclick="secureAction('DOWNLOAD', 'ABSENT')"><i class="fas fa-file-export"></i> Absent Excel</button>
        <button class="btn btn-upload" id="uploadBtn" disabled onclick="secureAction('BULK_ABSENT')">
            <i class="fas fa-upload"></i> Bulk Absent Upload
        </button>
        <input type="file" id="excelInput" hidden onchange="handleBulkAbsent(event)">
    </div>
</div>

<div class="container">
    <div class="filter-card">
        <div><label>Master List</label><select id="listSelect" onchange="loadTrainings()"></select></div>
        <div><label>Training Trade</label><select id="trainingSelect" onchange="validateFilters()"></select></div>
        <div style="text-align:right"><label>Absent Counter</label><div id="countDisplay" style="font-size:24px; font-weight:800; color:var(--primary)">0</div></div>
    </div>

    <div class="tab-box">
        <div class="tab active" id="tabPending" onclick="switchTab('PENDING')">PENDING (TARGET)</div>
        <div class="tab" id="tabAbsent" onclick="switchTab('ABSENT')">ALREADY ABSENT</div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Actions</th>
                    <th>App No</th>
                    <th>Candidate Details</th>
                    <th>Aadhar Status</th>
                    <th>Call Logs (1st & Last)</th>
                    <th>Timeline Info</th>
                </tr>
            </thead>
            <tbody id="absentTable">
                <tr><td colspan="6" align="center" style="padding:60px; color:#94a3b8;">Select Master List and Training.</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination" class="pagination"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBfAuBYPAbcxctTQjiRF3TwPE3eNNwYwxk",
    authDomain: "dbform-db4c9.firebaseapp.com",
    databaseURL: "https://dbform-db4c9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbform-db4c9",
    storageBucket: "dbform-db4c9.firebasestorage.app",
    messagingSenderId: "930632470946",
    appId: "1:930632470946:web:c87062b66c96ee6e5762fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let masterData = [], filteredData = [], currentTab = 'PENDING';
let specialMap = {}, enrolledApps = new Set(), historyMap = {}, callers = [];
let activeUser = null, EMPLOYEE_LOGIN_PIN = "", curPage = 1, pageSize = 10;

function checkSecurity() {
    const session = sessionStorage.getItem('activeUser');
    if (!session) { window.location.href = 'login.html'; return false; }
    activeUser = JSON.parse(session);
    EMPLOYEE_LOGIN_PIN = String(activeUser.pin || "");
    const roles = activeUser.roles || [activeUser.role];
    if (!roles.some(r => String(r).toLowerCase() === 'mis lead')) { document.getElementById('lockScreen').style.display = 'flex'; return false; }
    document.getElementById('uNameDisp').innerText = `MIS LEAD: ${activeUser.name.toUpperCase()}`;
    return true;
}

window.onload = async () => {
    if(!checkSecurity()) return;
    const [metaS, empS, specS, enrollS, histS] = await Promise.all([
        db.ref('OverallListsMetadata').once('value'),
        db.ref('EmployeeAuthList').once('value'),
        db.ref('SpecialCandidatesList').once('value'),
        db.ref('BatchEnrollments').once('value'),
        db.ref('CallHistory').once('value')
    ]);
    empS.forEach(e => {
        const d = e.val();
        if((d.roles || []).includes('Caller') || d.role === 'Caller') callers.push({id: String(d.pin || e.key), name: d.name});
    });
    specS.forEach(c => { if(c.val().appNo) specialMap[String(c.val().appNo).toUpperCase()] = c.val(); });
    enrollS.forEach(b => { Object.keys(b.val()).forEach(app => enrolledApps.add(String(app).toUpperCase())); });
    historyMap = histS.val() || {};
    let h = '<option value="">-- Choose List --</option>';
    metaS.forEach(c => { if(c.val().status !== 'Hide It') h += `<option value="${c.key}">${c.val().listName}</option>`; });
    document.getElementById('listSelect').innerHTML = h;
};

async function loadTrainings() {
    const lid = document.getElementById('listSelect').value;
    if(!lid) return;
    db.ref('Trainings').orderByChild('listId').equalTo(lid).once('value', s => {
        let h = '<option value="">-- Select Trade --</option>';
        s.forEach(c => { if(c.val().status !== 'Hide It') h += `<option value="${c.val().tradeName}">${c.val().trainingName}</option>`; });
        document.getElementById('trainingSelect').innerHTML = h;
    });
}

function validateFilters() {
    const lid = document.getElementById('listSelect').value;
    const trade = document.getElementById('trainingSelect').value;
    if(lid && trade) { document.getElementById('uploadBtn').disabled = false; syncLive(); }
}

function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById(t === 'PENDING' ? 'tabPending' : 'tabAbsent').classList.add('active');
    curPage = 1;
    filterAndRender();
}

function syncLive() {
    const lid = document.getElementById('listSelect').value;
    const trade = document.getElementById('trainingSelect').value;
    db.ref(`FullDataEntries/${lid}`).orderByChild('tradeName').equalTo(trade).on('value', snap => {
        masterData = [];
        snap.forEach(c => {
            const d = c.val(); d.dbKey = c.key;
            if(!enrolledApps.has(String(d.applicationNumber).toUpperCase())) masterData.push(d);
        });
        filterAndRender();
    });
}

function filterAndRender() {
    filteredData = masterData.filter(d => {
        const isA = d.isAbsent || d.status === "ABSENT";
        const isV = d.isVerified || (d.verifiedAadhar && d.verifiedAadhar.length === 12);
        return (currentTab === 'ABSENT') ? isA : (!isA && !isV);
    });
    renderTable();
}

function renderTable() {
    let h = '', count = 0;
    const start = (curPage - 1) * pageSize;
    const pageItems = filteredData.slice(start, start + pageSize);

    pageItems.forEach(d => {
        const isA = d.isAbsent || d.status === "ABSENT";
        if(isA) count++;
        const spec = specialMap[String(d.applicationNumber).toUpperCase()];
        const rowCls = spec ? 'row-special' : '';
        let actBtns = currentTab === 'PENDING' ? 
            `<button class="btn" style="background:#4f46e5; color:white; font-size:10px;" onclick="openAssign('${d.dbKey}')">Assign</button>
             ${spec ? `<button class="btn" style="background:var(--warning); color:#000;" onclick="Swal.fire('Area','Verifier: ${spec.of || 'N/A'}','info')">Area</button>` : `<button class="btn" style="background:var(--primary); color:white;" onclick="markAbsent('${d.dbKey}')">Absent</button>`}` : 
            `<button class="btn" style="background:var(--success); color:white;" onclick="secureRestore('${d.dbKey}')">Restore</button>`;

        let logH = historyMap[d.dbKey] ? `<div class="log-box" style="background:#f0fdf4;"><b>1ST:</b> ${Object.values(historyMap[d.dbKey])[0].status}</div>
            <div class="log-box" style="background:#fff1f2;"><b>LAST:</b> ${Object.values(historyMap[d.dbKey]).pop().status}</div>` : 'No history';

        h += `<tr class="${rowCls}"><td>${actBtns}</td><td><b style="color:var(--primary)">${d.applicationNumber}</b></td><td><b>${d.applicantName}</b><br><small>${d.fatherName}</small></td>
            <td>${d.verifiedAadhar || 'PENDING'}</td><td>${logH}</td><td><small>${d.absentMarkedAt || d.lastCallTime || '-'}</small></td></tr>`;
    });
    document.getElementById('absentTable').innerHTML = h || '<tr><td colspan="6" align="center">No records.</td></tr>';
    document.getElementById('countDisplay').innerText = filteredData.length;
    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredData.length / pageSize);
    let h = '';
    if(totalPages > 1) {
        for(let i=1; i<=totalPages; i++) h += `<button class="p-btn ${i===curPage?'active':''}" onclick="curPage=${i};renderTable();">${i}</button>`;
    }
    document.getElementById('pagination').innerHTML = h;
}

async function secureAction(action, type) {
    const { value: pin } = await Swal.fire({ title: 'PIN Required', input: 'password', showCancelButton: true });
    if (pin === EMPLOYEE_LOGIN_PIN && pin !== "") {
        if(action === 'DOWNLOAD') downloadReport(type);
        if(action === 'BULK_ABSENT') document.getElementById('excelInput').click();
    } else if (pin !== undefined) Swal.fire('Error', 'Incorrect PIN', 'error');
}

async function secureRestore(key) {
    const { value: pin } = await Swal.fire({ title: 'PIN Required', input: 'password', showCancelButton: true });
    if (pin === EMPLOYEE_LOGIN_PIN) {
        const lid = document.getElementById('listSelect').value;
        await db.ref(`FullDataEntries/${lid}/${key}`).update({ status: "AVAILABLE", isAbsent: false, absentMarkedAt: null });
        Swal.fire('Restored', 'Success', 'success');
    }
}

function downloadReport(type) {
    const dataList = masterData.filter(d => {
        const isA = d.isAbsent || d.status === "ABSENT";
        const isV = d.isVerified || (d.verifiedAadhar && d.verifiedAadhar.length === 12);
        const app = String(d.applicationNumber).toUpperCase();
        if(specialMap[app] || enrolledApps.has(app)) return false;
        return type === 'ABSENT' ? isA : (!isA && !isV);
    });
    const rows = dataList.map((d, i) => ({
        "S.No": i+1, "App No": d.applicationNumber, "Name": d.applicantName, "Father Name": d.fatherName, 
        "Mobile": d.mobile || "-", "1st Call": historyMap[d.dbKey] ? Object.values(historyMap[d.dbKey])[0].status : "-", 
        "Last Call": historyMap[d.dbKey] ? Object.values(historyMap[d.dbKey]).pop().status : "-"
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");
    XLSX.writeFile(wb, `${type}_List_${new Date().toLocaleDateString()}.xlsx`);
}

async function openAssign(sId) {
    const cand = masterData.find(x => x.dbKey === sId);
    const { value: form } = await Swal.fire({
        title: 'Assign Task',
        html: `<select id="swCaller" class="swal2-input">${callers.map(c => `<option value="${c.id}|${c.name}">${c.name}</option>`).join('')}</select>
               <input id="swReason" class="swal2-input" placeholder="Reason (e.g. Follow-up)">`,
        preConfirm: () => ({ caller: document.getElementById('swCaller').value, reason: document.getElementById('swReason').value })
    });
    if(form) {
        const [cId, cName] = form.caller.split('|');
        await db.ref(`UrgentCalls/${sId}`).set({ candidateId: sId, candidateName: cand.applicantName, mobile: cand.mobile, applicationNumber: cand.applicationNumber, assignedTo: String(cId), assignedToName: cName, reason: form.reason || "Verification", status: 'Pending', assignedDate: new Date().toLocaleString(), callCount: 0 });
        Swal.fire('Allotted', 'Success', 'success');
    }
}

async function markAbsent(key) {
    const lid = document.getElementById('listSelect').value;
    await db.ref(`FullDataEntries/${lid}/${key}`).update({ status: "ABSENT", isAbsent: true, absentMarkedAt: new Date().toLocaleString('en-IN') });
}

async function handleBulkAbsent(e) {
    const lid = document.getElementById('listSelect').value;
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).Sheets[XLSX.utils.book_new().SheetNames[0]]);
        for(let row of json) {
            const app = String(row['App No'] || row['Application No'] || "").trim().toUpperCase();
            const cand = masterData.find(c => String(c.applicationNumber).toUpperCase() === app);
            if(cand && !cand.isVerified && !specialMap[app]) await db.ref(`FullDataEntries/${lid}/${cand.dbKey}`).update({ status: "ABSENT", isAbsent: true, absentMarkedAt: new Date().toLocaleString() });
        }
        Swal.fire('Bulk Done', 'Success', 'success');
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
}
</script>
</body>
</html>
