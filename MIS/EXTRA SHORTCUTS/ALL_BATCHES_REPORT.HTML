<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Pro | VSSY Folder Master V2</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --red: #be123c; --red-bg: #fff1f2; --gradient: linear-gradient(135deg, #be123c, #fb7185); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--red-bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 28px; padding: 35px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(190, 18, 60, 0.1); border: 1px solid #ffe4e6; text-align: center; }
        .header-icon { width: 70px; height: 70px; background: var(--red-bg); color: var(--red); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
        h2 { color: var(--red); font-weight: 800; margin-bottom: 5px; }
        p { color: #64748b; font-size: 13px; margin-bottom: 25px; }
        label { display: block; text-align: left; font-size: 11px; font-weight: 800; color: var(--red); margin-bottom: 8px; text-transform: uppercase; margin-top: 15px; }
        select { width: 100%; padding: 14px; border-radius: 14px; border: 2px solid #fda4af; font-weight: 600; font-size: 14px; outline: none; background: #fffcfc; transition: 0.3s; margin-bottom: 5px; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; margin-top: 20px; background: #fef2f2; padding: 12px; border-radius: 12px; border: 1px dashed var(--red); cursor: pointer; }
        .checkbox-container input { width: 18px; height: 18px; cursor: pointer; }
        .btn-download { background: var(--gradient); color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; box-shadow: 0 10px 20px rgba(190, 18, 60, 0.2); }
        .btn-download:disabled { background: #cbd5e1; cursor: not-allowed; }
        #loader { display: none; margin-top: 15px; font-weight: 700; color: var(--red); font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-icon"><i class="fas fa-file-shield"></i></div>
    <h2>VSSY Secure Export</h2>
    <p>Select List & Process All Trades</p>

    <label>Select Master List</label>
    <select id="listSelect">
        <option value="">-- Choose Master List --</option>
    </select>

    <label class="checkbox-container">
        <input type="checkbox" id="hideDetails">
        <span style="font-size: 12px; font-weight: 700; color: #be123c;">MASK SENSITIVE DATA (PROTECTED)</span>
    </label>

    <button id="downloadBtn" class="btn-download" onclick="verifyPinAndProcess()">
        <i class="fas fa-lock"></i> VERIFY & DOWNLOAD ZIP
    </button>
    
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Generating Secure Assets...</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyBfAuBYPAbcxctTQjiRF3TwPE3eNNwYwxk",
    authDomain: "dbform-db4c9.firebaseapp.com",
    databaseURL: "https://dbform-db4c9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbform-db4c9",
    storageBucket: "dbform-db4c9.firebasestorage.app",
    messagingSenderId: "930632470946",
    appId: "1:930632470946:web:c87062b66c96ee6e5762fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

window.onload = () => {
    db.ref('OverallListsMetadata').once('value', snap => {
        const sel = document.getElementById('listSelect');
        snap.forEach(c => {
            if(c.val().status !== 'Hide It') sel.innerHTML += `<option value="${c.key}">${c.val().listName}</option>`;
        });
    });
};

function formatDate(d) {
    if (!d || d === "-") return "-";
    const date = new Date(d);
    return isNaN(date) ? d : date.toLocaleDateString('en-GB').replace(/\//g, '-');
}

function maskData(val, type) {
    if(!val || val === "-") return "-";
    const s = String(val).replace(/\s/g, '');
    if(type === 'mobile') return s.substring(0,2) + "XXXXXX" + s.substring(s.length - 2);
    if(type === 'aadhar') return s.substring(0,4) + " XXXX " + s.substring(s.length - 4);
    return val;
}

// PIN Verification before processing
async function verifyPinAndProcess() {
    const listId = document.getElementById('listSelect').value;
    if(!listId) return Swal.fire('Error', 'Master list select karein', 'error');

    const { value: pin } = await Swal.fire({
        title: 'Enter Security PIN',
        input: 'password',
        inputPlaceholder: 'Type 4-digit PIN',
        showCancelButton: true,
        confirmButtonColor: '#be123c'
    });

    if (pin === '8090') {
        generateZip();
    } else if (pin) {
        Swal.fire('Access Denied', 'Invalid PIN!', 'error');
    }
}

async function generateZip() {
    const listId = document.getElementById('listSelect').value;
    const listName = document.getElementById('listSelect').options[document.getElementById('listSelect').selectedIndex].text;
    const isHidden = document.getElementById('hideDetails').checked;

    document.getElementById('loader').style.display = 'block';
    const btn = document.getElementById('downloadBtn');
    btn.disabled = true;

    try {
        const zip = new JSZip();
        const [batchesSnap, enrollSnap, masterSnap] = await Promise.all([
            db.ref('Batches').once('value'),
            db.ref('BatchEnrollments').once('value'),
            db.ref(`FullDataEntries/${listId}`).once('value')
        ]);

        const batches = [];
        batchesSnap.forEach(s => { if(s.val().listId === listId) batches.push({id: s.key, ...s.val()}); });
        const enrollments = enrollSnap.val() || {};
        const masterData = masterSnap.val() || {};

        for (const batch of batches) {
            const tradeFolderName = (batch.trainingName || "Unknown_Trade").replace(/[\\/:*?"<>|]/g, '');
            const tradeFolder = zip.folder(tradeFolderName);
            const members = enrollments[batch.id] ? Object.keys(enrollments[batch.id]) : [];
            
            if(members.length === 0) continue;

            const workbook = new ExcelJS.Workbook();
            const sheetName = `${batch.trainingName}_${batch.batchName}`.substring(0, 30);
            const sheet = workbook.addWorksheet(sheetName);

            // Style: Header (Merge & Center)
            sheet.mergeCells('A1:H1');
            const h1 = sheet.getCell('A1');
            h1.value = `TRADE: ${batch.trainingName} | BATCH: ${batch.batchName}`;
            h1.font = { bold: true, size: 14, color: { argb: 'FFFFFFFF' } };
            h1.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFBE123C' } };
            h1.alignment = { horizontal: 'center', vertical: 'middle' };

            sheet.mergeCells('A2:H2');
            const h2 = sheet.getCell('A2');
            h2.value = `DATES: ${formatDate(batch.startDate)} TO ${formatDate(batch.endDate)}`;
            h2.font = { bold: true };
            h2.alignment = { horizontal: 'center', vertical: 'middle' };

            // Table Header Rows
            const headers = ['SR', 'APPLICATION NUMBER', 'NAME', 'FATHER NAME', 'DOB', 'MOBILE NUMBER', 'ADHARCARD NUMBER', 'GENDER'];
            const headerRow = sheet.getRow(4);
            headerRow.values = headers;
            headerRow.eachCell(c => {
                c.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF334155' } };
                c.alignment = { horizontal: 'center', vertical: 'middle' };
                c.border = { top:{style:'thick'}, left:{style:'thick'}, bottom:{style:'thick'}, right:{style:'thick'} };
            });

            // Populate Data
            let sr = 1;
            members.forEach(appNo => {
                const m = Object.values(masterData).find(x => String(x.applicationNumber) === String(appNo));
                if(m) {
                    const row = sheet.addRow([
                        sr++,
                        m.applicationNumber || '-',
                        (m.applicantName || '').toUpperCase(),
                        (m.fatherName || '').toUpperCase(),
                        formatDate(m.dob),
                        isHidden ? maskData(m.mobile, 'mobile') : (m.mobile || '-'),
                        isHidden ? maskData(m.verifiedAadhar || m.aadhar, 'aadhar') : (m.verifiedAadhar || m.aadhar || '-'),
                        (m.gender || 'N/A').toUpperCase()
                    ]);
                    row.eachCell(c => {
                        c.alignment = { horizontal: 'center', vertical: 'middle' };
                        c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                    });
                }
            });

            // STICKY AUTO-FIT (Based on Cell Content)
            sheet.columns.forEach(column => {
                let maxLen = 0;
                column.eachCell({ includeEmpty: true }, (cell) => {
                    const cellValue = cell.value ? cell.value.toString() : '';
                    if (cellValue.length > maxLen) maxLen = cellValue.length;
                });
                column.width = maxLen + 5; // Adding padding for center alignment
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const excelFileName = `${listName}_${batch.trainingName}_Report_${batch.batchName}.xlsx`.replace(/\s+/g, '_');
            tradeFolder.file(excelFileName, buffer);
        }

        const zipContent = await zip.generateAsync({type:"blob"});
        saveAs(zipContent, `${listName}_Allinonereport.zip`);
        Swal.fire('Success', 'Bulk Export Complete!', 'success');

    } catch (e) {
        console.error(e);
        Swal.fire('Error', 'Export process failed', 'error');
    } finally {
        document.getElementById('loader').style.display = 'none';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
