<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VKETC | Admin Verification</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #be123c; --primary-dark: #9f1239; --success: #059669; --bg: #f8fafc; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1e293b; padding-bottom: 100px; }
        
        .header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 2px solid #fff1f2; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; gap: 15px; }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #fff1f2; color: var(--primary); cursor: pointer; transition: 0.3s; }

        .main-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-history { background: white; border: 1.5px solid #e2e8f0; padding: 12px; border-radius: 15px; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; color: #64748b; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-assigned { border-color: var(--primary); color: var(--primary); background: #fff1f2; }

        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 18px; border: 1px solid #e2e8f0; position: relative; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); }
        .card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: #cbd5e1; }
        .card.updated::before { background: var(--success); }

        .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 18px; margin: 12px 0; }
        .label { font-size: 9px; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 13px; font-weight: 700; color: #334155; display: block; margin-top: 2px; }

        .caller-badge { font-size: 11px; font-weight: 700; color: var(--primary); background: #fff1f2; padding: 6px 12px; border-radius: 10px; display: inline-flex; align-items: center; gap: 6px; }

        .btn { border: none; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-verify { background: var(--success); color: white; margin-top: 15px; }

        .bulk-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 2000; }
        .btn-bulk { background: #0f172a; color: white; padding: 18px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); display: none; }

        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 3000; display: none; place-items: center; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--primary)"></i></div>

<div class="header">
    <div class="back-btn" onclick="window.history.back()"><i class="fas fa-chevron-left"></i></div>
    <div style="flex-grow: 1;">
        <h2 style="margin:0; font-size:16px; font-weight:800; color:#0f172a;">VKETC | VERIFICATION</h2>
        <div style="font-size:10px; font-weight:700; color:var(--primary);"><i class="fas fa-shield-check"></i> ADMIN MODE</div>
    </div>
    <div style="display:flex; gap:12px;">
        <i class="fas fa-file-pdf" onclick="exportReport('PDF')" style="color:#e11d48; font-size:22px; cursor:pointer;"></i>
        <i class="fas fa-file-excel" onclick="exportReport('EXCEL')" style="color:var(--success); font-size:22px; cursor:pointer;"></i>
    </div>
</div>

<div class="main-container">
    <div class="action-bar">
        <div class="btn-history btn-assigned" onclick="exportAssignedExcel()">
            <i class="fas fa-download"></i> ASSIGNED EXCEL
        </div>
        <div class="btn-history" onclick="downloadArchives()">
            <i class="fas fa-history"></i> PAST HISTORY
        </div>
    </div>
    <div id="pendingResults"></div>
</div>

<div class="bulk-container">
    <button id="bulkBtn" class="btn btn-bulk animate__animated animate__bounceInUp" onclick="openBulkPopup()">
        <i class="fas fa-check-double"></i> APPROVE ALL UPDATED (<span id="bulkNum">0</span>)
    </button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBfAuBYPAbcxctTQjiRF3TwPE3eNNwYwxk",
    authDomain: "dbform-db4c9.firebaseapp.com",
    databaseURL: "https://dbform-db4c9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbform-db4c9",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let urgentMap = {};
let currentUser = { name: "Aman Shrivastav", role: "Manager" };

window.onload = async () => {
    toggleLoader(true);
    db.ref('UrgentCalls').on('value', snap => {
        urgentMap = snap.val() || {};
        renderList();
        updateUI();
        toggleLoader(false);
    });
};

function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'grid' : 'none'; }

function updateUI() {
    const updatedCount = Object.values(urgentMap).filter(x => x.lastCallStatus || x.status === 'Updated').length;
    document.getElementById('bulkBtn').style.display = updatedCount > 0 ? 'flex' : 'none';
    document.getElementById('bulkNum').innerText = updatedCount;
}

function renderList() {
    let h = '';
    Object.keys(urgentMap).reverse().forEach(key => {
        const d = urgentMap[key];
        const isUpd = !!(d.lastCallStatus || d.status === 'Updated');
        // FIX: Application Number detection from both possible keys
        const appId = d.applicationNumber || d.applicationNo || d.appNo || 'N/A';
        
        h += `
        <div class="card ${isUpd ? 'updated' : ''} animate__animated animate__fadeInUp">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <h3 style="margin:0; font-size:16px; font-weight:800; color:#1e293b;">${d.candidateName}</h3>
                <span style="font-size:10px; font-weight:800; color:var(--primary); background:#fff1f2; padding:4px 8px; border-radius:6px;">ID: ${appId}</span>
            </div>
            
            <div class="detail-row">
                <div><span class="label">Father Name</span><span class="value">${d.fatherName || 'N/A'}</span></div>
                <div><span class="label">Trade</span><span class="value">${d.trade || d.tradeName || 'N/A'}</span></div>
                <div><span class="label">Mobile</span><span class="value">${d.mobile}</span></div>
                <div><span class="label">Reason</span><span class="value">${d.reason || 'N/A'}</span></div>
            </div>

            <div class="caller-badge">
                <i class="fas fa-headset"></i> Assigned: ${d.assignedToName || 'Universal'}
            </div>

            ${isUpd ? `
            <div style="background:#f0fdf4; border:1px solid #bbf7d0; border-radius:18px; padding:15px; margin-top:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="background:var(--success); color:white; padding:4px 12px; border-radius:20px; font-size:10px; font-weight:800;">${d.lastCallStatus || 'Updated'}</span>
                    <span style="font-size:10px; font-weight:700; color:#166534;"><i class="fas fa-clock"></i> ${d.lastCallTime || ''}</span>
                </div>
                <p style="font-size:12px; margin:0; color:#1e293b;"><b>Remark:</b> ${d.callerMessage || d.lastCallRemark || d.statusRemark || '-'}</p>
                <button class="btn btn-verify" onclick="verifyAndArchive('${key}')">
                    <i class="fas fa-check-circle"></i> VERIFY & CLOSE TASK
                </button>
            </div>` : `<div style="text-align:center; padding:15px; color:#94a3b8; font-size:11px; font-weight:700; letter-spacing:1px;">WAITING FOR CALLER RESPONSE...</div>`}
        </div>`;
    });
    document.getElementById('pendingResults').innerHTML = h || '<div style="text-align:center; padding:50px; opacity:0.5;"><i class="fas fa-folder-open fa-3x"></i><p>Queue is empty</p></div>';
}

// FIX: Excel download now uses applicationNumber correctly
function exportAssignedExcel() {
    const dataRows = Object.values(urgentMap).map(d => ({
        "Application Number": d.applicationNumber || d.applicationNo || d.appNo || 'N/A',
        "Candidate Name": d.candidateName,
        "Mobile Number": d.mobile,
        "Father Name": d.fatherName || 'N/A',
        "Trade": d.trade || d.tradeName || 'N/A',
        "Assigned To": d.assignedToName || 'Universal',
        "Assign Date": d.assignedDate || 'N/A',
        "Current Status": d.lastCallStatus || d.status || 'Pending'
    }));

    if(dataRows.length === 0) return Swal.fire('No Data', 'Export karne ke liye koi data nahi hai.', 'info');

    const ws = XLSX.utils.json_to_sheet(dataRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Assigned_List");
    XLSX.writeFile(wb, `Assigned_Calls_${new Date().toLocaleDateString()}.xlsx`);
}

async function openBulkPopup() {
    const toProcess = Object.keys(urgentMap).filter(k => urgentMap[k].lastCallStatus || urgentMap[k].status === 'Updated');
    
    const confirm = await Swal.fire({
        title: 'Bulk Approval',
        text: `Kya aap sabhi ${toProcess.length} updated tasks ko verify karke close karna chahte hain?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Haan, Approve All',
        confirmButtonColor: '#059669'
    });

    if(confirm.isConfirmed) {
        toggleLoader(true);
        try {
            for(let k of toProcess) {
                const d = urgentMap[k];
                const archiveData = {
                    ...d,
                    verifiedBy: currentUser.name,
                    verifiedAt: new Date().toLocaleString('en-IN'),
                    archiveYear: 2026
                };
                await db.ref('VerifiedArchives').push().set(archiveData);
                await db.ref(`UrgentCalls/${k}`).remove();
            }
            toggleLoader(false);
            Swal.fire('Success', `${toProcess.length} Tasks verify ho gaye hain`, 'success');
        } catch (e) {
            toggleLoader(false);
            Swal.fire('Error', 'Kuch error aaya hai.', 'error');
        }
    }
}

async function verifyAndArchive(key) {
    const d = urgentMap[key];
    const confirm = await Swal.fire({ 
        title: 'Verify Details?', 
        text: `Archiving record for ${d.candidateName}`,
        icon: 'info',
        showCancelButton: true,
        confirmButtonColor: '#059669'
    });
    
    if(confirm.isConfirmed) {
        toggleLoader(true);
        const archiveData = { ...d, verifiedBy: currentUser.name, verifiedAt: new Date().toLocaleString('en-IN'), archiveYear: 2026 };
        await db.ref('VerifiedArchives').push().set(archiveData);
        await db.ref(`UrgentCalls/${key}`).remove();
        toggleLoader(false);
        Swal.fire({ icon: 'success', title: 'Verified', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
    }
}

async function exportReport(type) {
    const dataRows = Object.values(urgentMap).filter(x => x.lastCallStatus || x.status === 'Updated').map(d => [
        d.applicationNumber || d.applicationNo || d.appNo || 'N/A',
        d.candidateName, d.mobile, d.lastCallStatus || 'Updated', d.lastCallTime || '', d.assignedToName || ''
    ]);

    if(type === 'EXCEL') {
        const ws = XLSX.utils.json_to_sheet(dataRows.map(r => ({ "App ID": r[0], "Name": r[1], "Mobile": r[2], "Status": r[3], "Time": r[4], "Caller": r[5] })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "VKETC_Report");
        XLSX.writeFile(wb, `VKETC_Live_Report_2026.xlsx`);
    } else {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("VKETC | VERIFICATION REPORT", 14, 20);
        doc.autoTable({ startY: 30, head: [['App ID', 'Candidate', 'Mobile', 'Status', 'Time', 'Caller']], body: dataRows });
        doc.save(`VKETC_Report_2026.pdf`);
    }
}

async function downloadArchives() {
    toggleLoader(true);
    const snap = await db.ref('VerifiedArchives').limitToLast(1000).once('value');
    const logs = [];
    snap.forEach(s => logs.push(s.val()));
    toggleLoader(false);

    if(logs.length === 0) return Swal.fire('No Records', 'Archive is empty', 'info');

    const ws = XLSX.utils.json_to_sheet(logs);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "History_2026");
    XLSX.writeFile(wb, `VKETC_Verified_Archives.xlsx`);
}
</script>
</body>
</html>
